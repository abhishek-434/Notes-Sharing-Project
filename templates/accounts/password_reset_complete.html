{% extends 'base.html' %}
{% block title %}Password Reset Complete - NotesHub{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card animate-scale-in text-center">
    <div style="font-size:4rem;margin-bottom:1rem;">✅</div>
    <h2 class="fw-800 mb-2">Password Reset!</h2>
    <p style="color:var(--text-muted);">Your password has been successfully reset. You can now log in with your new password.</p>
    <a href="{% url 'accounts:login' %}" class="btn btn-primary-gradient px-5 mt-3">Login Now</a>
  </div>
</div>
{% endblock %}
