{% extends 'base.html' %}
{% block title %}Forgot Password - NotesHub{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card animate-scale-in">
    <div class="text-center mb-4">
      <div class="d-inline-flex align-items-center justify-content-center mb-3"
           style="width:60px;height:60px;background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.3);border-radius:18px;">
        <i class="bi bi-key-fill text-warning" style="font-size:1.5rem;"></i>
      </div>
      <h2 class="fw-800 mb-1">Forgot Password?</h2>
      <p style="color:var(--text-muted);font-size:0.9rem;">Enter your email and we'll send you a reset link</p>
    </div>
    <form method="post">
      {% csrf_token %}
      <div class="mb-4">
        <label class="form-label"><i class="bi bi-envelope me-1"></i>Email Address</label>
        {{ form.email }}
      </div>
      <button type="submit" class="btn btn-primary-gradient w-100 py-2 fw-600 mb-3">
        <i class="bi bi-send me-2"></i>Send Reset Link
      </button>
    </form>
    <div class="text-center">
      <a href="{% url 'accounts:login' %}" style="color:var(--text-muted);font-size:0.9rem;">
        <i class="bi bi-arrow-left me-1"></i>Back to login
      </a>
    </div>
  </div>
</div>
{% endblock %}
