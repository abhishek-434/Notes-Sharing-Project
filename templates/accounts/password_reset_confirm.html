{% extends 'base.html' %}
{% block title %}Reset Password - NotesHub{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card animate-scale-in">
    <div class="text-center mb-4">
      <h2 class="fw-800 mb-1">Reset Password</h2>
      <p style="color:var(--text-muted);">Enter your new password below</p>
    </div>
    <form method="post">
      {% csrf_token %}
      {% for field in form %}
        <div class="mb-3">
          <label class="form-label">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}<div class="text-danger small mt-1">{{ field.errors.0 }}</div>{% endif %}
        </div>
      {% endfor %}
      <button type="submit" class="btn btn-primary-gradient w-100 py-2 fw-600">Reset Password</button>
    </form>
  </div>
</div>
{% endblock %}
