{% extends 'base.html' %}
{% block title %}Reset Your Password - NotesHub{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card animate-scale-in">
    <div class="text-center mb-4">
      <h2 class="fw-800 mb-1">Reset Password</h2>
      <p style="color:var(--text-muted);">Enter your email to receive a reset link</p>
    </div>
    <form method="post">
      {% csrf_token %}
      <div class="mb-4">
        <label class="form-label">Email Address</label>
        {{ form.email }}
      </div>
      <button type="submit" class="btn btn-primary-gradient w-100 py-2 fw-600">Send Reset Link</button>
    </form>
    <div class="text-center mt-3">
      <a href="{% url 'accounts:login' %}" style="color:var(--text-muted);font-size:0.9rem;"><i class="bi bi-arrow-left me-1"></i>Back to login</a>
    </div>
  </div>
</div>
{% endblock %}
