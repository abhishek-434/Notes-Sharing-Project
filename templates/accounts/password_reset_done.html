{% extends 'base.html' %}
{% block title %}Password Reset Sent - NotesHub{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card animate-scale-in text-center">
    <div style="font-size:4rem;margin-bottom:1rem;">📧</div>
    <h2 class="fw-800 mb-2">Check Your Email</h2>
    <p style="color:var(--text-muted);">We've sent a password reset link to your email address. It may take a few minutes to arrive.</p>
    <a href="{% url 'accounts:login' %}" class="btn btn-primary-gradient px-5 mt-3">Back to Login</a>
  </div>
</div>
{% endblock %}
